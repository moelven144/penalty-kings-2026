<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Penalty Kings: Shootout</title>
  <style>
    :root { color-scheme: dark; }
    body { margin: 0; min-height: 100vh; background: radial-gradient(1000px 600px at 50% -10%, #16264a, #0a1020 60%);
      color: #eef2fb; font-family: -apple-system, "Segoe UI", system-ui, Roboto, Arial, sans-serif;
      display: flex; align-items: center; justify-content: center; text-align: center; padding: 24px; }
    .card { max-width: 540px; }
    .trophy { font-size: 60px; }
    h1 { font-size: clamp(30px, 7vw, 52px); letter-spacing: 4px; margin: 8px 0 0; }
    .sub { color: #ffc83d; font-weight: 800; letter-spacing: 3px; margin: 2px 0 18px; }
    p { color: #cdd6e6; line-height: 1.6; }
    .links { margin-top: 22px; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    a.btn { color: #fff; text-decoration: none; font-weight: 700; padding: 12px 20px; border-radius: 12px;
      background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.18); }
    a.btn:hover { background: rgba(47,191,91,.18); border-color: #2fbf5b; }
    footer { margin-top: 26px; color: #9fb0c9; font-size: 13px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="trophy">🏆⚽</div>
    <h1>PENALTY</h1>
    <div class="sub">KINGS</div>
    <p>A pseudo-3D penalty-shootout tournament game — pick your nation and win every match
      from the spot, group stage to the final. Coming to the App Store.</p>
    <div class="links">
      <a class="btn" href="./privacy.html">Privacy Policy</a>
      <a class="btn" href="./support.html">Support</a>
    </div>
    <footer>© 2026 · Contact: permagnehelseth@gmail.com</footer>
  </div>
</body>
</html>
